<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단어 학습 플래시 카드</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header class="header">
            <h1><i class="fas fa-graduation-cap"></i> 단어 학습 플래시 카드</h1>
                <div class="header-buttons">
                    <button id="viewScoresBtn" class="btn btn-secondary" onclick="showScoresApp();">
                        <i class="fas fa-chart-bar"></i> 점수 보기
                    </button>
                    <button id="startQuizBtn" class="btn btn-primary" onclick="startQuizApp();">
                        <i class="fas fa-play"></i> 학습 시작
                    </button>
                </div>
        </header>

        <!-- 디버깅 메시지 (개발 중에만 표시) -->
        <div id="debugMessage" style="display: none; background: #fff3cd; border: 1px solid #ffeaa7; color: #856404; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 12px;">
            디버깅 모드 - 브라우저 콘솔을 확인하세요 (F12)
        </div>

        <!-- 시작 화면 -->
        <div id="startScreen" class="screen active">
            <div class="welcome-card">
                <h2>단어 학습을 시작해볼까요?</h2>
                <p>10개의 단어를 학습하고 의미를 맞춰보세요!</p>
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-mobile-alt"></i>
                        <span>모바일/PC 지원</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-trophy"></i>
                        <span>점수 기록</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-list"></i>
                        <span>4지선다형 퀴즈</span>
                    </div>
                </div>
                
                <!-- 시작 버튼 추가 -->
                <div style="margin-top: 30px;">
                    <button id="startQuizBtn2" class="btn btn-primary" style="font-size: 18px; padding: 15px 30px;">
                        <i class="fas fa-play"></i> 학습 시작
                    </button>
                </div>
                
                <!-- 디버그용 테스트 버튼 -->
                <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.7); border-radius: 10px; font-size: 12px;">
                    <strong>테스트:</strong>
                    <button onclick="addTestScore(8)" class="btn btn-secondary" style="padding: 5px 10px; font-size: 11px; margin: 2px;">+8점</button>
                    <button onclick="addTestScore(6)" class="btn btn-secondary" style="padding: 5px 10px; font-size: 11px; margin: 2px;">+6점</button>
                    <button onclick="addTestScore(9)" class="btn btn-secondary" style="padding: 5px 10px; font-size: 11px; margin: 2px;">+9점</button>
                    <button onclick="clearAllScores()" class="btn btn-danger" style="padding: 5px 10px; font-size: 11px; margin: 2px;">점수 초기화</button>
                </div>
            </div>
        </div>

        <!-- 퀴즈 화면 -->
        <div id="quizScreen" class="screen">
            <div class="quiz-header">
                <div class="progress-info">
                    <span id="currentQuestion">1</span> / <span id="totalQuestions">10</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <div class="score-info">
                    점수: <span id="currentScore">0</span>
                </div>
            </div>

            <div class="flash-card">
                <div class="word-display">
                    <h2 id="currentWord">단어</h2>
                    <p class="instruction">의미를 선택하세요:</p>
                </div>

                <div class="options-grid" id="optionsGrid">
                    <!-- 옵션 버튼들이 동적으로 생성됩니다 -->
                </div>

                <div class="navigation">
                    <button id="prevBtn" class="btn btn-secondary" disabled>
                        <i class="fas fa-chevron-left"></i> 이전
                    </button>
                    <button id="nextBtn" class="btn btn-primary" disabled>
                        다음 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="resultScreen" class="screen">
            <div class="result-card">
                <div class="result-header">
                    <i class="fas fa-trophy result-icon"></i>
                    <h2>학습 완료!</h2>
                </div>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="finalScore" class="score-number">0</span>
                        <span class="score-total">/ 10</span>
                    </div>
                    <div class="score-message" id="scoreMessage">잘했어요!</div>
                </div>

                <div class="result-actions">
                    <button id="retryBtn" class="btn btn-primary">
                        <i class="fas fa-redo"></i> 다시 학습
                    </button>
                    <button id="viewScoresBtn2" class="btn btn-secondary">
                        <i class="fas fa-chart-bar"></i> 점수 보기
                    </button>
                </div>
            </div>
        </div>

        <!-- 점수 기록 화면 -->
        <div id="scoresScreen" class="screen">
            <div class="scores-card">
                <div class="scores-header">
                    <h2><i class="fas fa-chart-bar"></i> 점수 기록</h2>
                    <button id="clearScoresBtn" class="btn btn-danger">
                        <i class="fas fa-trash"></i> 초기화
                    </button>
                </div>
                
                <div id="scoresList" class="scores-list">
                    <!-- 점수 기록이 동적으로 표시됩니다 -->
                </div>

                <div class="scores-actions">
                    <button id="backToStartBtn" class="btn btn-secondary">
                        <i class="fas fa-home"></i> 홈으로
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>준비 중...</p>
        </div>
    </div>

    <script src="js/words.js"></script>
    <script src="js/quiz.js"></script>
    <script>
        // 전역 스코프에서 quizApp 변수 초기화
        var quizApp;
        
        // DOM이 완전히 로드된 후 실행
        document.addEventListener('DOMContentLoaded', function() {
            try {
                console.log('DOM loaded, initializing quiz app...');
                
                // words.js가 로드되었는지 확인
                if (typeof wordsData === 'undefined') {
                    console.error('words.js not loaded properly');
                    return;
                }
                
                // 테스트 점수 추가 (첫 실행시에만)
                if (!localStorage.getItem('wordQuizScores') || localStorage.getItem('wordQuizScores') === '[]') {
                    console.log('No scores found, adding test scores...');
                    if (typeof addTestScores === 'function') {
                        addTestScores();
                        console.log('Test scores added');
                    } else {
                        console.warn('addTestScores function not found');
                    }
                } else {
                    console.log('Existing scores found, skipping test data');
                }
                
                quizApp = new WordQuiz();
                console.log('Quiz app initialized successfully!');
                
            } catch (error) {
                console.error('Error initializing quiz app:', error);
                // 오류 발생 시 재시도
                setTimeout(function() {
                    try {
                        quizApp = new WordQuiz();
                        console.log('Quiz app initialized on retry');
                    } catch (retryError) {
                        console.error('Retry failed:', retryError);
                    }
                }, 500);
            }
        });
        
        // 안전한 시작 함수
        function startQuizApp() {
            console.log('startQuizApp called');
            if (window.quizApp && typeof window.quizApp.startQuiz === 'function') {
                console.log('Starting quiz...');
                try {
                    window.quizApp.startQuiz();
                    console.log('Quiz started successfully');
                } catch (error) {
                    console.error('Error starting quiz:', error);
                    alert('퀴즈를 시작하는 중 오류가 발생했습니다.');
                }
            } else {
                alert('앱이 아직 준비되지 않았습니다. 페이지를 새로고침 해주세요.');
            }
        }
        
        // 점수 관련 테스트 함수들
        function addTestScore(score) {
            try {
                console.log('Adding test score:', score);
                saveScore(score);
                alert('테스트 점수 ' + score + '/10이 추가되었습니다.');
            } catch (error) {
                console.error('Error adding test score:', error);
                alert('점수 추가 중 오류가 발생했습니다.');
            }
        }
        
        function clearAllScores() {
            if (confirm('모든 점수를 삭제하시겠습니까?')) {
                try {
                    clearScores();
                    alert('모든 점수가 삭제되었습니다.');
                } catch (error) {
                    console.error('Error clearing scores:', error);
                    alert('점수 삭제 중 오류가 발생했습니다.');
                }
            }
        }
        
        function showScoresApp() {
            console.log('showScoresApp called');
            if (window.quizApp && typeof window.quizApp.showScores === 'function') {
                console.log('Showing scores...');
                try {
                    window.quizApp.showScores();
                    console.log('Scores shown successfully');
                } catch (error) {
                    console.error('Error showing scores:', error);
                    alert('점수를 표시하는 중 오류가 발생했습니다.');
                }
            } else {
                alert('앱이 아직 준비되지 않았습니다. 페이지를 새로고침 해주세요.');
            }
        }
    </script>
</body>
</html>
